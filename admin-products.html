<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المنتجات</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container { max-width: 1400px; }
        header { 
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .product-card { 
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            transition: transform 0.3s;
        }
        .product-card:hover { transform: translateY(-5px); }
        .product-image { 
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #f0f0f0;
        }
        .product-body { padding: 15px; }
        .product-title { font-weight: bold; color: #333; margin-bottom: 10px; }
        .product-price { 
            color: #e74c3c;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .btn-group { 
            display: flex;
            gap: 5px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .btn-sm { 
            padding: 5px 10px;
            font-size: 12px;
        }
        .form-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .loading { 
            display: none; 
            text-align: center; 
            padding: 20px; 
        }
        .loading.show { 
            display: block; 
        }
        .alert { 
            margin-bottom: 20px; 
            animation: slideIn 0.3s;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #image-preview { 
            margin-top: 10px;
        }
        #image-preview img {
            max-height: 150px;
            border-radius: 5px;
        }
        .modal-backdrop {
            background-color: rgba(0,0,0,0.7);
        }
        .modal {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-dialog {
            max-width: 400px;
        }
        .form-label {
            font-weight: 500;
            color: #333;
        }
    </style>
</head>
<body>
    <!-- Login Modal -->
    <div id="login-modal" class="modal" style="display: none; background: rgba(0,0,0,0.5);">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header" style="background: #667eea; color: white;">
                    <h5 class="modal-title">🔐 تسجيل الدخول</h5>
                </div>
                <div class="modal-body">
                    <form id="login-form">
                        <div class="mb-3">
                            <label for="login-username" class="form-label">اسم المستخدم</label>
                            <input type="text" class="form-control" id="login-username" placeholder="admin" required>
                        </div>
                        <div class="mb-3">
                            <label for="login-password" class="form-label">كلمة المرور</label>
                            <input type="password" class="form-control" id="login-password" placeholder="admin123" required>
                        </div>
                        <button type="button" class="btn btn-primary w-100" onclick="login()">
                            <i class="fas fa-sign-in-alt"></i> دخول
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1> إدارة </h1>
                    <p>     </p>
                </div>
                <button class="btn btn-danger btn-sm" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> تسجيل خروج
                </button>
            </div>
        </header>

        <div id="alert-container"></div>

        <div class="mb-4">
            <div class="btn-group" role="group" aria-label="Admin tabs" id="admin-tabs">
                <button class="btn btn-outline-primary active" type="button" onclick="switchAdminTab('products')">المنتجات</button>
                <button class="btn btn-outline-primary" type="button" onclick="switchAdminTab('telegram')">اعدادات مهمة</button>
                <button class="btn btn-outline-primary" type="button" onclick="switchAdminTab('security')">الأمان</button>
            </div>
        </div>

        <div id="tab-products" class="admin-tab active-tab">
            <div class="form-section">
                <h3>
                    <span id="form-title">➕ إضافة منتج جديد</span>
                </h3>
                <form id="product-form" enctype="multipart/form-data">
                    <input type="hidden" id="product-id" />
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">اسم المنتج *</label>
                            <input type="text" class="form-control" id="name" required />
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">وزن الخروف</label>
                            <input type="text" class="form-control" id="category" placeholder="مثلاً 11-12 أو 15-16" />
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">الوصف</label>
                        <textarea class="form-control" id="description" rows="3"></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-3 mb-3">
                            <label class="form-label">السعر الحالي *</label>
                            <input type="number" class="form-control" id="price" step="0.01" required />
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">السعر السابق</label>
                            <input type="number" class="form-control" id="previous_price" step="0.01" />
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">الخصم (%)</label>
                            <input type="number" class="form-control" id="discount" step="0.01" />
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">الصورة</label>
                            <input type="file" class="form-control" id="image" accept="image/*" />
                        </div>
                    </div>

                    <div id="image-preview"></div>

                    <div class="btn-group mt-3">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> حفظ
                        </button>
                        <button type="button" class="btn btn-secondary" onclick="resetForm()">
                            <i class="fas fa-redo"></i> إلغاء
                        </button>
                    </div>
                </form>
            </div>

            <div class="form-section">
                <h3>⚙️ عمليات</h3>
                <button class="btn btn-warning btn-sm" onclick="clearAllProducts()">
                    <i class="fas fa-trash"></i> حذف جميع المنتجات
                </button>
                <button class="btn btn-info btn-sm" onclick="loadProducts()">
                    <i class="fas fa-sync"></i> تحديث
                </button>
            </div>

            <div class="form-section">
                <h3>📋 المنتجات</h3>
                <div class="loading show" id="loading">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">جاري التحميل...</span>
                    </div>
                    <p>جاري تحميل المنتجات...</p>
                </div>
                <div id="products-container" class="row"></div>
            </div>
        </div>

        <div id="tab-telegram" class="admin-tab" style="display:none;">
            <div class="form-section">
                <h3>لا تلعب بشيئ ابدآ </h3>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">توكن </label>
                        <input type="text" class="form-control" id="tg_bot_token" placeholder="لا تلعب بشيئ" />
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Chat ID</label>
                        <input type="text" class="form-control" id="tg_chat_id" placeholder="لا تلعب بشيئ" />
                    </div>
                </div>
                <div class="btn-group mt-2">
                    <button class="btn btn-success" id="save-settings-btn">حفظ الإعدادات</button>
                </div>
                <div id="settings-alert" style="margin-top:10px"></div>
            </div>
        </div>

        <div id="tab-security" class="admin-tab" style="display:none;">
            <div class="form-section">
                <h3>🔒 الأمان</h3>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">كلمة المرور القديمة</label>
                        <input type="password" class="form-control" id="old_password" />
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">كلمة المرور الجديدة</label>
                        <input type="password" class="form-control" id="new_password" />
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">تأكيد كلمة المرور الجديدة</label>
                        <input type="password" class="form-control" id="confirm_new_password" />
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">   (  اتركه فارغ)</label>
                        <input type="text" class="form-control" id="backup_password" placeholder="اتركه فارغ" />
                    </div>

                </div>
                <div class="btn-group mt-2">
                    <button class="btn btn-primary" id="change-password-btn">تغيير كلمة المرور</button>
                    <button class="btn btn-info" id="refresh-sessions-btn">تحديث الأجهزة المتصلة</button>
                </div>
                <div id="security-alert" style="margin-top:10px"></div>

                <hr style="margin:20px 0;">
                <h5>الأجهزة المتصلة</h5>
                <div id="sessions-list"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let authHeader = '';
        let editingProductId = null;

        function switchAdminTab(tab) {
            const tabs = ['products', 'telegram', 'security'];
            tabs.forEach(name => {
                const button = document.querySelector(`#admin-tabs button[onclick="switchAdminTab('${name}')"]`);
                const section = document.getElementById(`tab-${name}`);
                if (button) button.classList.toggle('active', name === tab);
                if (section) section.style.display = name === tab ? 'block' : 'none';
            });
        }

        async function parseJsonResponse(res) {
            const text = await res.text();
            try {
                return JSON.parse(text);
            } catch (err) {
                console.error('Non-JSON response:', text);
                return { success: false, message: res.ok ? 'Unexpected server response' : `Server returned ${res.status} ${res.statusText}` };
            }
        }

        // تسجيل الدخول
        async function login() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            if (!username || !password) {
                showAlert('يرجى إدخال اسم المستخدم وكلمة المرور', 'warning');
                return;
            }

            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const result = await parseJsonResponse(res);
                if (result.success && result.token) {
                    authHeader = 'Bearer ' + result.token;
                    localStorage.setItem('authHeader', authHeader);
                    document.getElementById('login-modal').style.display = 'none';
                    loadProducts();
                    loadSettings();
                    loadSessions();
                } else {
                    showAlert(result.message || 'فشل تسجيل الدخول', 'danger');
                }
            } catch (err) {
                console.error(err);
                showAlert('خطأ في تسجيل الدخول', 'danger');
            }
        }

        // التحقق من المصادقة عند تحميل الصفحة
        document.addEventListener('DOMContentLoaded', function() {
            if (localStorage.getItem('authHeader')) {
                authHeader = localStorage.getItem('authHeader');
                document.getElementById('login-modal').style.display = 'none';
                loadProducts();
                loadSettings();
                loadSessions();
            } else {
                document.getElementById('login-modal').style.display = 'flex';
            }
        });

        // تحميل المنتجات
        async function loadProducts() {
            try {
                const response = await fetch('/api/products');
                const result = await response.json();
                
                if (!result.success) {
                    showAlert('خطأ في تحميل المنتجات', 'danger');
                    return;
                }

                document.getElementById('loading').classList.remove('show');
                const container = document.getElementById('products-container');
                container.innerHTML = '';

                if (result.data.length === 0) {
                    container.innerHTML = '<div class="col-12"><p class="text-center">لا توجد منتجات حتى الآن</p></div>';
                    return;
                }

                result.data.forEach(product => {
                    const imageUrl = product.image_url || 'https://via.placeholder.com/300';
                    const card = document.createElement('div');
                    card.className = 'col-md-6 col-lg-4';
                    card.innerHTML = `
                        <div class="product-card">
                            <img src="${imageUrl}" class="product-image" alt="${product.name}" />
                            <div class="product-body">
                                <div class="product-title">${product.name}</div>
                                <div class="product-price">${product.price} د.ك</div>
                                <small class="text-muted">الوزن: ${product.category || 'غير محدد'}</small>
                                <div class="btn-group">
                                    <button class="btn btn-primary btn-sm" onclick="editProduct(${product.id})">
                                        <i class="fas fa-edit"></i> تعديل
                                    </button>
                                    <button class="btn btn-success btn-sm" onclick="duplicateProduct(${product.id})">
                                        <i class="fas fa-copy"></i> تكرار
                                    </button>
                                    <button class="btn btn-danger btn-sm" onclick="deleteProduct(${product.id})">
                                        <i class="fas fa-trash"></i> حذف
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error('خطأ:', error);
                showAlert('خطأ في التواصل مع الخادم', 'danger');
            }
        }

        // إضافة/تعديل منتج
        document.getElementById('product-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData();
            formData.append('name', document.getElementById('name').value);
            formData.append('description', document.getElementById('description').value);
            formData.append('price', document.getElementById('price').value);
            formData.append('previous_price', document.getElementById('previous_price').value);
            formData.append('discount', document.getElementById('discount').value);
            formData.append('category', document.getElementById('category').value);
            
            const imageFile = document.getElementById('image').files[0];
            if (imageFile) {
                formData.append('image', imageFile);
            }

            try {
                const productId = document.getElementById('product-id').value;
                const method = productId ? 'PUT' : 'POST';
                const url = productId ? '/api/products/' + productId : '/api/products';

                const response = await fetch(url, {
                    method: method,
                    headers: { 'Authorization': authHeader },
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    showAlert(result.message, 'success');
                    resetForm();
                    loadProducts();
                } else {
                    showAlert(result.message, 'danger');
                    if (response.status === 401 || response.status === 403) {
                        localStorage.removeItem('authHeader');
                        location.reload();
                    }
                }
            } catch (error) {
                console.error('خطأ:', error);
                showAlert('خطأ في الإرسال', 'danger');
            }
        });

        // تعديل منتج
        async function editProduct(id) {
            const response = await fetch('/api/products');
            const result = await response.json();
            const product = result.data.find(p => p.id === id);

            if (!product) {
                showAlert('لم يتم العثور على المنتج', 'danger');
                return;
            }

            document.getElementById('product-id').value = product.id;
            document.getElementById('name').value = product.name;
            document.getElementById('description').value = product.description;
            document.getElementById('price').value = product.price;
            document.getElementById('previous_price').value = product.previous_price;
            document.getElementById('discount').value = product.discount;
            document.getElementById('category').value = product.category;

            if (product.image_url) {
                document.getElementById('image-preview').innerHTML = `<img src="${product.image_url}" alt="${product.name}" />`;
            }

            document.getElementById('form-title').textContent = '✏️ تعديل المنتج';
            editingProductId = id;

            document.querySelector('html, body').scrollTop = 0;
        }

        // حذف منتج
        async function deleteProduct(id) {
            if (!confirm('هل أنت متأكد من حذف هذا المنتج؟')) return;

            try {
                const response = await fetch('/api/products/' + id, {
                    method: 'DELETE',
                    headers: { 'Authorization': authHeader }
                });

                const result = await response.json();

                if (result.success) {
                    showAlert('تم حذف المنتج', 'success');
                    loadProducts();
                } else {
                    showAlert(result.message, 'danger');
                }
            } catch (error) {
                showAlert('خطأ في الحذف', 'danger');
            }
        }

        // تكرار منتج
        async function duplicateProduct(id) {
            try {
                const response = await fetch('/api/products/' + id + '/duplicate', {
                    method: 'POST',
                    headers: { 'Authorization': authHeader }
                });

                const result = await response.json();

                if (result.success) {
                    showAlert('تم تكرار المنتج', 'success');
                    loadProducts();
                } else {
                    showAlert(result.message, 'danger');
                }
            } catch (error) {
                showAlert('خطأ في التكرار', 'danger');
            }
        }

        // حذف جميع المنتجات
        async function clearAllProducts() {
            if (!confirm('⚠️ هل أنت متأكد من حذف جميع المنتجات؟ هذه العملية لا يمكن استرجاعها!')) return;

            try {
                const response = await fetch('/api/products', {
                    method: 'DELETE',
                    headers: { 'Authorization': authHeader }
                });

                const result = await response.json();

                if (result.success) {
                    showAlert('تم حذف جميع المنتجات', 'success');
                    loadProducts();
                } else {
                    showAlert(result.message, 'danger');
                }
            } catch (error) {
                showAlert('خطأ في الحذف', 'danger');
            }
        }

        // إعادة تعيين النموذج
        function resetForm() {
            document.getElementById('product-form').reset();
            document.getElementById('product-id').value = '';
            document.getElementById('form-title').textContent = '➕ إضافة منتج جديد';
            document.getElementById('image-preview').innerHTML = '';
            editingProductId = null;
        }

        // عرض رسالة تنبيه
        function showAlert(message, type) {
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = `
                <button type="button" class="btn-close" onclick="this.parentElement.remove()"></button>
                ${message}
            `;
            document.getElementById('alert-container').appendChild(alert);

            setTimeout(() => {
                if (alert.parentElement) {
                    alert.remove();
                }
            }, 5000);
        }

        // تسجيل الخروج
        function logout() {
            if (confirm('هل تريد تسجيل الخروج؟')) {
                localStorage.removeItem('authHeader');
                location.reload();
            }
        }

        // ================= Settings (Telegram) =================
        async function loadSettings() {
            try {
                const res = await fetch('/api/settings', { headers: { 'Authorization': authHeader } });
                const result = await parseJsonResponse(res);
                if (result.success && result.data) {
                    document.getElementById('tg_bot_token').value = result.data.telegram_bot_token || '';
                    document.getElementById('tg_chat_id').value = result.data.telegram_chat_id || '';
                } else {
                    showSettingsAlert('لا يمكن تحميل الإعدادات', 'danger');
                }
            } catch (err) {
                console.error(err);
                showSettingsAlert('خطأ في تحميل الإعدادات', 'danger');
            }
        }

        async function saveSettings() {
            const btn = document.getElementById('save-settings-btn');
            try {
                btn.disabled = true;
                const payload = {
                    telegram_bot_token: document.getElementById('tg_bot_token').value.trim(),
                    telegram_chat_id: document.getElementById('tg_chat_id').value.trim()
                };

                const res = await fetch('/api/settings', {
                    method: 'PUT',
                    headers: Object.assign({ 'Content-Type': 'application/json' }, authHeader ? { 'Authorization': authHeader } : {}),
                    body: JSON.stringify(payload)
                });

                const result = await parseJsonResponse(res);
                if (result.success) {
                    showSettingsAlert('تم حفظ الإعدادات بنجاح', 'success');
                } else {
                    showSettingsAlert(result.message || 'فشل في الحفظ', 'danger');
                }
            } catch (err) {
                console.error(err);
                showSettingsAlert('خطأ في حفظ الإعدادات', 'danger');
            } finally {
                btn.disabled = false;
            }
        }

        function showSettingsAlert(message, type) {
            const el = document.getElementById('settings-alert');
            el.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => { el.innerHTML = ''; }, 4000);
        }

        document.getElementById('save-settings-btn').addEventListener('click', (e) => {
            e.preventDefault();
            if (!authHeader) {
                showSettingsAlert('يجب تسجيل الدخول أولاً', 'warning');
                return;
            }
            saveSettings();
        });

        // ================= Security actions =================
        document.getElementById('change-password-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            if (!authHeader) return showSecurityAlert('يجب تسجيل الدخول أولاً', 'warning');
            const oldp = document.getElementById('old_password').value.trim();
            const newp = document.getElementById('new_password').value.trim();
            const confirm = document.getElementById('confirm_new_password').value.trim();
            if (!oldp || !newp) return showSecurityAlert('يرجى ملء الحقول', 'warning');
            if (newp !== confirm) return showSecurityAlert('تأكيد كلمة المرور غير متطابق', 'warning');
            try {
                const res = await fetch('/api/admin/password', {
                    method: 'PUT',
                    headers: Object.assign({ 'Content-Type': 'application/json' }, authHeader ? { 'Authorization': authHeader } : {}),
                    body: JSON.stringify({ old_password: oldp, new_password: newp })
                });
                const result = await res.json();
                if (result.success) {
                    showSecurityAlert('تم تغيير كلمة المرور بنجاح', 'success');
                    // logout other sessions except current
                } else {
                    showSecurityAlert(result.message || 'فشل تغيير كلمة المرور', 'danger');
                }
            } catch (err) {
                console.error(err);
                showSecurityAlert('خطأ في تغيير كلمة المرور', 'danger');
            }
        });

        document.getElementById('refresh-sessions-btn').addEventListener('click', (e) => {
            e.preventDefault();
            loadSessions();
        });

        function showSecurityAlert(msg, type) {
            const el = document.getElementById('security-alert');
            el.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
            setTimeout(() => { el.innerHTML = ''; }, 4000);
        }

        async function loadSessions() {
            if (!authHeader) return;
            try {
                const res = await fetch('/api/admin/sessions', { headers: { 'Authorization': authHeader } });
                const result = await parseJsonResponse(res);
                if (result.success) {
                    renderSessions(result.data || []);
                } else {
                    showSecurityAlert('لا يمكن جلب الجلسات', 'danger');
                }
            } catch (err) {
                console.error(err);
                showSecurityAlert('خطأ في جلب الجلسات', 'danger');
            }
        }

        function renderSessions(sessions) {
            const container = document.getElementById('sessions-list');
            if (!sessions || sessions.length === 0) {
                container.innerHTML = '<p class="text-muted">لا توجد جلسات حالية</p>';
                return;
            }
            container.innerHTML = '<div class="list-group">' + sessions.map(s => {
                return `
                    <div class="list-group-item d-flex justify-content-between align-items-center">
                        <div>
                            <div><strong>${s.username}</strong> — <small class="text-muted">${s.ip || ''}</small></div>
                            <div><small>${s.userAgent || ''}</small></div>
                            <div><small>إنشئت: ${s.createdAt}</small></div>
                        </div>
                        <div>
                            <button class="btn btn-sm btn-danger" onclick="logoutSession('${s.id}')">تسجيل خروج</button>
                        </div>
                    </div>
                `;
            }).join('') + '</div>';
        }

        async function logoutSession(id) {
            if (!confirm('هل تريد تسجيل خروج هذه الجلسة؟')) return;
            try {
                const res = await fetch(`/api/admin/sessions/${id}/logout`, {
                    method: 'POST',
                    headers: Object.assign({}, authHeader ? { 'Authorization': authHeader } : {})
                });
                const result = await res.json();
                if (result.success) {
                    showSecurityAlert('تم تسجيل الخروج من الجلسة', 'success');
                    loadSessions();
                } else {
                    showSecurityAlert(result.message || 'فشل في تسجيل الخروج', 'danger');
                }
            } catch (err) {
                console.error(err);
                showSecurityAlert('خطأ في تسجيل الخروج', 'danger');
            }
        }

    </script>
</body>
</html>
